<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<base target="_top">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=jetbrains-mono@400,500&display=swap" rel="stylesheet">
<style>
:root{ color-scheme:light; --bg:#fff; --ink:#000; --soft:#3a3a3a; --muted:#7a7a7a; --faint:#c4c4c4; --line:#e5e5e5; --hover:#fafafa; --green:#1e7a46; --amber:#b7791f; --red:#c0392b; --ok-bg:#f3f8f4;
  --ui:'Satoshi',system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif; --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace; }
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--ui);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
.wrap{max-width:1180px;margin:0 auto;padding:18px 26px 56px;}
.mono{font-family:var(--mono);}
.head{display:flex;align-items:flex-end;justify-content:space-between;border-bottom:2px solid var(--ink);padding-bottom:12px;}
.head h1{font-weight:700;font-size:clamp(20px,2.2vw,26px);letter-spacing:-0.01em;margin:0;}
.head .sub{color:var(--muted);font-size:12.5px;margin-top:3px;max-width:720px;}
.head .meta{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;white-space:nowrap;}
.pill{display:inline-block;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em;padding:2px 7px;border:1px solid var(--line);border-radius:3px;margin-left:6px;}
.pill.off{color:var(--muted);} .pill.live{color:var(--green);border-color:#9ed1b0;background:var(--ok-bg);}
.stats{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);border-bottom:0;margin-top:18px;}
.stats .c{border-bottom:1px solid var(--line);border-right:1px solid var(--line);padding:10px 14px;}
.stats .c:nth-child(4){border-right:0;}
.stats .l{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.stats .v{font-family:var(--mono);font-size:18px;font-weight:500;margin-top:3px;} .stats .v.g{color:var(--green);}
.bar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:18px 0 4px;}
.seg{display:inline-flex;border:1px solid var(--ink);}
.seg button{border:0;border-right:1px solid var(--ink);background:transparent;color:var(--ink);padding:6px 13px;font-weight:700;font-size:11px;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;font-family:var(--ui);}
.seg button:last-child{border-right:0;} .seg button.active{background:var(--ink);color:var(--bg);}
.btn{font-family:var(--ui);text-transform:uppercase;font-weight:700;font-size:10.5px;letter-spacing:.05em;padding:6px 12px;border:1px solid var(--ink);background:#fff;cursor:pointer;}
.btn:hover{background:var(--ink);color:#fff;}
.btn.go{border-color:var(--green);color:var(--green);} .btn.go:hover{background:var(--green);color:#fff;}
table{width:100%;border-collapse:collapse;margin-top:8px;}
thead th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-align:left;padding:9px 12px;border-bottom:1px solid var(--line);}
thead th.r{text-align:right;}
tbody td{font-size:13.5px;padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle;}
tbody tr:hover{background:var(--hover);}
.tx-suit{white-space:nowrap;padding-right:16px;} .tx-suit b{font-weight:700;}
.tx-move{font-weight:500;white-space:nowrap;} .tx-move .d{color:var(--soft);} .tx-move .arw{color:var(--muted);margin:0 8px;font-family:var(--mono);} .tx-move .r{color:var(--ink);font-weight:700;}
.tx-move .rk{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-left:6px;}
.u{font-family:var(--mono);font-size:13px;text-align:right;} .gap{font-family:var(--mono);font-size:13px;text-align:right;}
.run{font-family:var(--mono);font-size:12px;color:var(--soft);white-space:nowrap;} .run b{color:var(--green);}
.ftag span{display:inline-block;white-space:nowrap;font-size:9px;font-weight:700;color:#c0392b;background:#fbeceb;border:1px solid #e8a39d;border-radius:3px;padding:1px 6px;text-transform:uppercase;letter-spacing:.03em;}
.flag{font-family:var(--mono);font-size:9.5px;color:var(--amber);border:1px solid #ecd9b0;background:#fcf8ef;padding:1px 5px;border-radius:3px;white-space:nowrap;}
.chip{font-family:var(--mono);font-size:11px;background:#f4f4f2;border:1px solid var(--line);border-radius:3px;padding:1px 6px;margin:2px 3px 0 0;display:inline-block;white-space:nowrap;}
.acts{text-align:right;white-space:nowrap;}
.acts button{font-family:var(--ui);text-transform:uppercase;font-weight:700;font-size:10.5px;letter-spacing:.05em;padding:5px 11px;border:1px solid;background:#fff;cursor:pointer;margin-left:7px;}
.ap{border-color:var(--green);color:var(--green);} .ap:hover{background:var(--green);color:#fff;}
.sk{border-color:var(--line);color:var(--muted);} .sk:hover{background:var(--soft);color:#fff;border-color:var(--soft);}
tr.approved{background:var(--ok-bg);} tr.approved .ap{background:var(--green);color:#fff;}
.stbadge{font-family:var(--mono);font-size:10px;padding:1px 6px;border:1px solid var(--line);border-radius:3px;color:var(--muted);}
.stbadge.dry{color:var(--amber);border-color:#ecd9b0;background:#fcf8ef;} .stbadge.done{color:var(--green);border-color:#9ed1b0;background:var(--ok-bg);}
.sect{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:22px 0 2px;}
.loading,.empty{border:1px solid var(--line);padding:34px;text-align:center;color:var(--muted);margin-top:20px;font-family:var(--mono);font-size:12px;}
.note{background:var(--hover);border:1px solid var(--line);border-left:3px solid var(--ink);padding:10px 13px;margin:12px 0;font-size:12.5px;}
.foot{text-align:center;font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:26px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <h1>Suit Reallocation</h1>
      <div class="sub">Dead store &rarr; proven seller. Sorted by receiving location (to), then sending location (from).</div>
    </div>
    <div class="meta"><span id="asof"></span><br><span id="mode"></span></div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="bar">
    <div class="seg" id="tabs">
      <button data-v="transfers" class="active">Transfers</button>
      <button data-v="approved">Approved</button>
      <button data-v="log">Log</button>
    </div>
    <button class="btn" onclick="refresh()">Reload</button>
    <button class="btn" onclick="rerun()">Re-run proposal</button>
    <span class="mono" id="msg" style="font-size:11px;color:var(--muted)"></span>
  </div>

  <div id="content"><div class="loading">Loading live proposals&hellip;</div></div>
  <div class="foot">State &amp; Liberty &middot; store-to-store reallocation &middot; nothing ships until approved</div>
</div>

<script>
var DATA = null, VIEW = 'transfers';

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function pct(v){ if(v==null||v==='')return ''; var n=Number(v); return Math.round((n<=1?n*100:n))+'%'; }
function isDone(x){ return /CREATED|DRY RUN|SHIPPED|RECEIVED|LOGGED/i.test(x.status||''); }
function setMsg(t){ document.getElementById('msg').textContent = t || ''; }
function onErr(e){ setMsg('Error: ' + (e && e.message ? e.message : e)); }

function refresh(){ setMsg('Loading…'); google.script.run.withSuccessHandler(function(d){ setMsg(''); onData(d); }).withFailureHandler(onErr).getProposalsData(); }
function rerun(){ setMsg('Re-running the engine (reads your workbook, ~1 min)…'); google.script.run.withSuccessHandler(function(d){ setMsg('Re-run complete.'); onData(d); }).withFailureHandler(onErr).webRunProposal(); }
function approve(rowIndex, val){ setMsg(val?'Approving…':'Skipping…'); google.script.run.withSuccessHandler(function(d){ setMsg(''); onData(d); }).withFailureHandler(onErr).webSetApprove(rowIndex, val); }
function createApproved(){ if(!confirm('Move all approved lines to the Log?\\n\\nDemo — no Brightpearl transfer and no email are created.')) return; setMsg('Moving to Log…'); google.script.run.withSuccessHandler(function(d){ setMsg(d.execMessage||'Done.'); if(d.csv) downloadCsv(d.csv); onData(d); }).withFailureHandler(onErr).webExecuteApproved(); }
function downloadLatestCsv(){ setMsg('Preparing CSV…'); google.script.run.withSuccessHandler(function(t){ setMsg(''); downloadCsv(t); }).withFailureHandler(onErr).getLatestCsv(); }
function downloadCsv(text){
  if(!text){ setMsg('No CSV yet — create a transfer first.'); return; }
  try{ var blob=new Blob([text],{type:'text/csv'}); var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download='realloc-transfer-'+new Date().toISOString().slice(0,10)+'.csv'; document.body.appendChild(a); a.click(); setTimeout(function(){URL.revokeObjectURL(url); a.remove();},1500); }
  catch(e){ setMsg('Download blocked here — the same CSV is in the "Transfer CSV" tab of the sheet.'); }
}
function createGroup(donorWid, recipWid){ if(!confirm('Move this from→to group to the Log?\\n\\nDemo — no transfer or email is created.')) return; setMsg('Moving to Log…'); google.script.run.withSuccessHandler(function(d){ setMsg(d.execMessage||'Done.'); if(d.csv) downloadCsv(d.csv); onData(d); }).withFailureHandler(onErr).webExecuteApproved(donorWid, recipWid); }
function downloadExport(){ setMsg('Building CSV…'); google.script.run.withSuccessHandler(function(t){ setMsg(''); downloadCsv(t); }).withFailureHandler(onErr).webExportApprovedCsv(); }

document.getElementById('tabs').addEventListener('click', function(e){
  var b = e.target.closest('button'); if(!b) return;
  VIEW = b.getAttribute('data-v');
  Array.prototype.forEach.call(this.children, function(c){ c.classList.toggle('active', c===b); });
  render();
});

function onData(d){
  DATA = d;
  document.getElementById('asof').textContent = 'As of ' + (d.asOf||'');
  document.getElementById('mode').innerHTML = 'Brightpearl writes: ' + (d.writesLive ? '<span class="pill live">Live</span>' : '<span class="pill off">Off (dry run)</span>');
  renderStats(d.stats);
  render();
}

function renderStats(s){
  var cells = [
    ['Proposed transfers', s.transfers],
    ['Units', s.units],
    ['Donor / recipient stores', s.donors + ' / ' + s.recipients],
    ['Approved', s.approved + (s.forceEmpties? '  ·  ' + s.forceEmpties + ' force-empty' : '')]
  ];
  document.getElementById('stats').innerHTML = cells.map(function(c){
    return '<div class="c"><div class="l">'+c[0]+'</div><div class="v'+(c[0]==='Approved'?' g':'')+'">'+esc(c[1])+'</div></div>';
  }).join('');
}

// SORT: by TO location (recipient) first, then by FROM location (donor) — grouped by store.
function sortToFrom(a,b){
  var ra=String(a.recipient||''), rb=String(b.recipient||'');
  if(ra!==rb) return ra<rb?-1:1;
  var da=String(a.donor||''), db=String(b.donor||'');
  return da<db?-1:(da>db?1:0);
}

function render(){
  var c = document.getElementById('content');
  if(!DATA){ c.innerHTML='<div class="loading">Loading…</div>'; return; }
  if(VIEW==='transfers') return renderTransfers(c);
  if(VIEW==='approved')  return renderApproved(c);
  if(VIEW==='log')       return renderLog(c);
}

function moveCell(x){
  var flag = x.noThreshold ? ' <span class="flag">confirm &mdash; no threshold</span>' : '';
  return '<span class="d">'+esc(x.donor)+'</span> <span class="rk">#'+esc(x.donorRank)+'</span>'
    + '<span class="arw">&rarr;</span><span class="r">'+esc(x.recipient)+'</span> <span class="rk">#'+esc(x.recipRank)+'</span>' + flag;
}

function renderTransfers(c){
  var rows = DATA.rows.filter(function(r){ return !isDone(r) && !r.approve; }).slice().sort(sortToFrom);
  if(!rows.length){ c.innerHTML = '<div class="empty">No open proposals. Everything is executed, or run the weekly proposal.</div>'; return; }
  var head = '<thead><tr><th>Suit</th><th>Move (from &rarr; to)</th><th class="r">Rank gap</th><th>Recipient run</th><th class="r">Units</th><th class="r">Approve</th></tr></thead>';
  var body = rows.map(function(x){
    var ftag = x.force ? '<div class="ftag"><span>force empty</span></div>' : '';
    var acts = '<button class="ap" onclick="approve('+x.rowIndex+',true)">'+(x.approve?'Approved':'Approve')+'</button>'
             + '<button class="sk" onclick="approve('+x.rowIndex+',false)">Skip</button>';
    return '<tr class="'+(x.approve?'approved':'')+'">'
      + '<td class="tx-suit"><b>'+esc(x.style)+'</b>'+ftag+'</td>'
      + '<td class="tx-move">'+moveCell(x)+'</td>'
      + '<td class="gap">'+esc(x.gap)+'</td>'
      + '<td class="run">'+pct(x.runNow)+' <span class="arw">&rarr;</span> <b>'+pct(x.runAfter)+'</b></td>'
      + '<td class="u">'+esc(x.units)+'</td>'
      + '<td class="acts">'+acts+'</td></tr>';
  }).join('');
  c.innerHTML = '<table>'+head+'<tbody>'+body+'</tbody></table>';
}

// Consolidate approved lines by donor→recipient pair.
function pairsOf(rows){
  var m = {};
  rows.forEach(function(r){
    var k = r.donorWid+'|'+r.recipWid;
    var p = m[k] || (m[k]={ donor:r.donor, donorWid:r.donorWid, recipient:r.recipient, recipWid:r.recipWid, recipRank:r.recipRank, donorRank:r.donorRank, styles:[], units:0, noThreshold:false });
    p.styles.push(r.style); p.units += Number(r.units||0); if(r.noThreshold) p.noThreshold=true;
    return p;
  });
  return Object.keys(m).map(function(k){return m[k];}).sort(sortToFrom);
}

function renderApproved(c){
  var appr = DATA.rows.filter(function(r){ return r.approve && !isDone(r); });
  if(!appr.length){ c.innerHTML = '<div class="empty">Nothing approved yet. Tick Approve on the Transfers tab.</div>'; return; }
  var pairs = pairsOf(appr);
  var note = '<div class="note">Each row is one <b>from&rarr;to group</b>. <b>Create</b> moves it to the <b>Log</b> '
    + '(demo &mdash; no Brightpearl transfer and no email are created). Use <b>Export CSV</b> for the Brightpearl upload file. '
    + 'Approvals &amp; logged items are saved &mdash; re-running the proposal keeps them.</div>';
  var bar = '<div class="bar"><button class="btn go" onclick="createApproved()">Create all ('+pairs.length+')</button>'
    + '<button class="btn" onclick="downloadExport()">Export CSV (for Brightpearl)</button></div>';
  var head = '<thead><tr><th>From &rarr; To</th><th>Styles</th><th class="r">Units</th><th class="r">Action</th></tr></thead>';
  var body = pairs.map(function(p){
    var flag = p.noThreshold ? ' <span class="flag">confirm &mdash; no threshold</span>' : '';
    return '<tr><td class="tx-move"><span class="d">'+esc(p.donor)+'</span><span class="arw">&rarr;</span><span class="r">'+esc(p.recipient)+'</span>'+flag+'</td>'
      + '<td>'+p.styles.map(function(s){return '<span class="chip">'+esc(s)+'</span>';}).join('')+'</td>'
      + '<td class="u">'+p.units+'</td>'
      + '<td class="acts"><button class="ap" onclick="createGroup(\''+esc(p.donorWid)+'\',\''+esc(p.recipWid)+'\')">Create</button></td></tr>';
  }).join('');
  c.innerHTML = note + bar + '<table>'+head+'<tbody>'+body+'</tbody></table>';
}

function renderLog(c){
  var done = DATA.rows.filter(isDone);
  if(!done.length){ c.innerHTML = '<div class="empty">No transfers/emails generated yet. Approve, then Create from the Approved tab.</div>'; return; }
  // Consolidate by transfer id.
  var m = {};
  done.forEach(function(r){
    var k = r.transferId || (r.donorWid+'|'+r.recipWid);
    var g = m[k] || (m[k]={ transferId:r.transferId, donor:r.donor, recipient:r.recipient, styles:[], units:0, status:r.status });
    g.styles.push(r.style); g.units += Number(r.units||0);
  });
  var groups = Object.keys(m).map(function(k){return m[k];});
  var head = '<thead><tr><th>Transfer</th><th>From &rarr; To</th><th>Styles</th><th class="r">Units</th><th>Status</th></tr></thead>';
  var body = groups.map(function(g){
    var cls = /DRY RUN/i.test(g.status)?'dry':'done';
    return '<tr><td class="mono">'+esc(g.transferId||'')+'</td>'
      + '<td class="tx-move"><span class="d">'+esc(g.donor)+'</span><span class="arw">&rarr;</span><span class="r">'+esc(g.recipient)+'</span></td>'
      + '<td>'+g.styles.map(function(s){return '<span class="chip">'+esc(s)+'</span>';}).join('')+'</td>'
      + '<td class="u">'+g.units+'</td>'
      + '<td><span class="stbadge '+cls+'">'+esc(g.status)+'</span></td></tr>';
  }).join('');
  var dl = DATA.hasCsv ? '<div class="bar"><button class="btn go" onclick="downloadLatestCsv()">Download transfer CSV</button></div>' : '';
  c.innerHTML = '<div class="note">Transfers &amp; email drafts you\'ve generated. Email drafts are in Gmail &rarr; Drafts (add the store address and send). '
    + 'Live shipment status is tracked in the sheet\'s Tracker tab.</div>'
    + dl + '<table>'+head+'<tbody>'+body+'</tbody></table>';
}

refresh();
</script>
</body>
</html>
